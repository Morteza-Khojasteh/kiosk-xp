<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection Error</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --brand: #16a34a;
        --brand-light: #22c55e;
        --danger: #dc2626;
        --text: #1e293b;
        --muted: #64748b;
        --border: #e2e8f0;
        --bg: #f8fafc;
        --card: #ffffff;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at top,
            rgba(34, 197, 94, 0.08),
            transparent 40%
          ),
          var(--bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 600px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        box-shadow:
          0 20px 40px rgba(15, 23, 42, 0.08),
          0 2px 6px rgba(15, 23, 42, 0.04);
      }

      .icon-wrapper {
        width: 90px;
        height: 90px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: rgba(220, 38, 38, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon {
        width: 48px;
        height: 48px;
        color: var(--danger);
      }

      h1 {
        color: var(--text);
        font-size: 30px;
        margin-bottom: 12px;
        font-weight: 700;
      }

      .message {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
        margin-bottom: 28px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(220, 38, 38, 0.08);
        color: var(--danger);
        font-weight: 600;
        margin-bottom: 24px;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: var(--danger);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      .retry-line {
        font-size: 13px;
        color: var(--muted);
        margin-top: -8px;
        margin-bottom: 24px;
      }

      .footer {
        padding-top: 24px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .brand {
        margin-top: 12px;
        color: var(--brand);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 13px;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(1.3);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon-wrapper">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="50"
          height="50"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m16 3 5 5" />
          <path
            d="M2 12h20A10 10 0 1 1 12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 4-10"
          />
          <path d="m21 3-5 5" />
        </svg>
      </div>

      <div class="status">
        <span class="dot"></span>
        Server Connection Lost
      </div>

      <h1>Unable to Connect</h1>

      <p class="message">
        The Staff Clock System cannot reach the server at the moment. Please
        check the network connection or contact your supervisor if the problem
        continues.
      </p>

      <p class="retry-line" id="retryLine">Retrying in 10s…</p>

      <div class="footer">
        Ensure the till is connected to the company network and try again.

        <div class="brand">Clock System</div>
      </div>
    </div>

    <script>
      /* AHK monitors this page's title for the offline state and
         performs the actual retry/navigation — see ClockSystem.ahk.
         This countdown is purely visual feedback for the user. */
      var RETRY_SECONDS = 10;
      var countdown = RETRY_SECONDS;
      var retryLine = document.getElementById("retryLine");

      function tick() {
        countdown--;
        if (countdown <= 0) {
          retryLine.textContent = "Retrying now…";
          countdown = RETRY_SECONDS;
        } else {
          retryLine.textContent = "Retrying in " + countdown + "s…";
        }
      }

      setInterval(tick, 1000);
    </script>
  </body>
</html>
