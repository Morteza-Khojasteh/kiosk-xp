<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 65px;
        height: 65px;
        overflow: hidden;
        background: transparent;
      }

      button {
        width: 65px;
        height: 65px;
        border: none;
        border-radius: 30%;
        background: rgba(220, 38, 38, 0.95);
        color: white;
        font-size: 36px;
        line-height: 1;
        cursor: pointer;
        transition:
          background 0.2s ease,
          box-shadow 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:hover {
        background: rgba(185, 28, 28, 0.98);
        font-size: 40px;
      }

      button:active {
        background: rgba(153, 27, 27, 1);
      }
    </style>
  </head>
  <body>
    <button id="closeBtn" title="Close application">&#x2715;</button>

    <script>
      document.getElementById("closeBtn").addEventListener("click", function () {
        document.title = "CMD:CLOSE_APP";
      });
    </script>
  </body>
</html>
