<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock System Setup</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --brand: #16a34a;
        --brand-dark: #15803d;
        --brand-light: #22c55e;
        --text: #1e293b;
        --muted: #64748b;
        --border: #e2e8f0;
        --border-focus: #16a34a;
        --bg: #f8fafc;
        --card: #ffffff;
        --danger: #dc2626;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at top,
            rgba(34, 197, 94, 0.08),
            transparent 40%
          ),
          var(--bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 600px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 20px 40px 20px 40px;
        box-shadow:
          0 20px 40px rgba(15, 23, 42, 0.08),
          0 2px 6px rgba(15, 23, 42, 0.04);
      }

      .icon-wrapper {
        width: 90px;
        height: 90px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: rgba(22, 163, 74, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon {
        width: 48px;
        height: 48px;
        color: var(--brand);
      }

      h1 {
        color: var(--text);
        font-size: 26px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 8px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
        text-align: center;
        margin-bottom: 32px;
      }

      .field {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
      }

      input[type="text"] {
        width: 100%;
        padding: 12px 16px;
        font-size: 15px;
        font-family: inherit;
        color: var(--text);
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      input[type="text"]:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
        background: var(--card);
      }

      input::placeholder {
        color: #94a3b8;
      }

      .error-msg {
        display: none;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        font-size: 13px;
        color: var(--danger);
        font-weight: 500;
      }

      .error-msg.visible {
        display: flex;
      }

      button {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        border: none;
        border-radius: 10px;
        background: var(--brand);
        color: white;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition:
          background 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.1s ease;
        box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
      }

      button:hover {
        background: var(--brand-dark);
        box-shadow: 0 6px 16px rgba(22, 163, 74, 0.4);
      }

      button:active {
        transform: scale(0.98);
        box-shadow: 0 2px 8px rgba(22, 163, 74, 0.2);
      }

      button:disabled {
        background: #86efac;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      .footer {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
        text-align: center;
      }

      .brand {
        margin-top: 10px;
        color: var(--brand);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon-wrapper">
        <svg
          class="icon"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0
             002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0
             001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0
             00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0
             00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0
             00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0
             00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0
             001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07
             2.572-1.065z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
      </div>

      <h1>Device Setup</h1>
      <p class="subtitle">
        Enter the device token assigned to this till to register it with the
        Clock System.
      </p>

      <div class="field">
        <label for="token">Device Token</label>
        <input
          id="token"
          type="text"
          placeholder="e.g. TILL-A1B2C3D4"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="error-msg" id="errorMsg">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          Please enter a valid device token.
        </div>
      </div>

      <button id="saveBtn">Save &amp; Launch</button>

      <div class="footer">
        Contact your supervisor if you do not have a device token.
        <div class="brand">Clock System</div>
      </div>
    </div>

    <script>
      var saveBtn = document.getElementById("saveBtn");
      var tokenIn = document.getElementById("token");
      var errorMsg = document.getElementById("errorMsg");

      function handleSave() {
        var token = tokenIn.value.trim();

        if (!token) {
          errorMsg.classList.add("visible");
          tokenIn.focus();
          return;
        }

        errorMsg.classList.remove("visible");
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving…";

        /* AHK bridge: window title is polled by ClockSystem.ahk.
           Setting it to this sentinel string triggers the launcher
           to write config.json and switch to kiosk mode. */
        document.title = "CMD:SAVE_TOKEN:" + token;

        setTimeout(function () {
          saveBtn.disabled = false;
          saveBtn.textContent = "Save & Launch";
          errorMsg.textContent = "Failed to save token. Please try again.";
          errorMsg.classList.add("visible");
          document.title = "Clock System Setup";
        }, 4000);
      }

      saveBtn.addEventListener("click", handleSave);

      tokenIn.addEventListener("keydown", function (e) {
        if (e.key === "Enter") handleSave();
      });

      tokenIn.addEventListener("input", function () {
        errorMsg.classList.remove("visible");
      });
    </script>
  </body>
</html>
