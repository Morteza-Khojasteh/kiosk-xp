<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brand:       #16a34a;
      --brand-light: #22c55e;
      --text:        #1e293b;
      --muted:       #64748b;
      --bg:          #f8fafc;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, .08), transparent 40%),
        var(--bg);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      gap: 32px;
    }

    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 5px solid rgba(22, 163, 74, 0.15);
      border-top-color: var(--brand);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .label h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .label p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    .dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 4px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand-light);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    .brand {
      position: fixed;
      bottom: 32px;
      color: var(--brand);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="spinner"></div>

  <div class="label">
    <h1>Starting Clock System</h1>
    <p>Connecting to the server, please wait…</p>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="brand">Clock System</div>
</body>
</html>
